name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─── Backend Lint ──────────────────────────────────────────────────────────
  lint-backend:
    name: Backend Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check app/ tests/

      - name: Format check with ruff
        run: uv run ruff format --check app/ tests/

  # ─── Backend Type Check ────────────────────────────────────────────────────
  typecheck-backend:
    name: Backend Types (mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Type check with mypy
        run: uv run mypy app/ --ignore-missing-imports --no-strict-optional

  # ─── Backend Unit Tests ────────────────────────────────────────────────────
  test-backend:
    name: Backend Unit Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short
        env:
          # Dummy values — unit tests mock all external calls
          OPENAI_API_KEY: sk-test
          ANTHROPIC_API_KEY: sk-test
          PINECONE_API_KEY: test
          LANGSMITH_API_KEY: test

  # ─── Frontend Type Check ───────────────────────────────────────────────────
  typecheck-frontend:
    name: Frontend Types (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─── Frontend Lint ─────────────────────────────────────────────────────────
  lint-frontend:
    name: Frontend Lint (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0
