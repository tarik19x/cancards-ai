name: Deploy

on:
  push:
    branches: [main]

# Ensure only one deployment runs at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─── Build + Push Docker to Lightsail ─────────────────────────────────────
  build-and-deploy-backend:
    name: Build Docker Image → Lightsail
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install lightsailctl plugin
        run: |
          curl -sL "https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl" \
            -o /usr/local/bin/lightsailctl
          chmod +x /usr/local/bin/lightsailctl

      - name: Build Docker image
        working-directory: backend
        run: |
          docker build --platform linux/amd64 \
            -t cancards-backend:${{ github.sha }} \
            -t cancards-backend:latest \
            .

      - name: Push image to Lightsail
        run: |
          aws lightsail push-container-image \
            --region ${{ secrets.AWS_REGION }} \
            --service-name ${{ secrets.LIGHTSAIL_SERVICE_NAME }} \
            --label app \
            --image cancards-backend:latest \
            2>&1 | tee /tmp/push_output.txt

          # Extract the image reference from the output
          IMAGE_REF=$(grep "Refer to this image as" /tmp/push_output.txt | grep -o '":[^"]*"' | tr -d '"')
          echo "IMAGE_REF=$IMAGE_REF" >> $GITHUB_ENV
          echo "Pushed image reference: $IMAGE_REF"

      - name: Deploy to Lightsail
        run: |
          aws lightsail create-container-service-deployment \
            --region ${{ secrets.AWS_REGION }} \
            --service-name ${{ secrets.LIGHTSAIL_SERVICE_NAME }} \
            --containers "{
              \"app\": {
                \"image\": \"$IMAGE_REF\",
                \"ports\": {\"8000\": \"HTTP\"},
                \"environment\": {
                  \"OPENAI_API_KEY\": \"${{ secrets.OPENAI_API_KEY }}\",
                  \"ANTHROPIC_API_KEY\": \"${{ secrets.ANTHROPIC_API_KEY }}\",
                  \"PINECONE_API_KEY\": \"${{ secrets.PINECONE_API_KEY }}\",
                  \"PINECONE_INDEX_NAME\": \"cancards-index\",
                  \"PINECONE_CLOUD\": \"aws\",
                  \"PINECONE_REGION\": \"us-east-1\",
                  \"EMBEDDING_MODEL\": \"text-embedding-3-small\",
                  \"LLM_MODEL\": \"claude-sonnet-4-6\",
                  \"LLM_PROVIDER\": \"anthropic\",
                  \"LANGSMITH_API_KEY\": \"${{ secrets.LANGSMITH_API_KEY }}\",
                  \"LANGSMITH_PROJECT\": \"cancards-ai\",
                  \"LANGSMITH_TRACING\": \"true\",
                  \"APP_ENV\": \"production\",
                  \"LOG_LEVEL\": \"INFO\",
                  \"ALLOWED_ORIGINS\": \"https://cancards-ai.vercel.app\"
                }
              }
            }" \
            --public-endpoint "{
              \"containerName\": \"app\",
              \"containerPort\": 8000,
              \"healthCheck\": {\"path\": \"/health\"}
            }"

          echo "Lightsail deployment triggered for commit ${{ github.sha }}"

  # ─── Deploy Frontend to Vercel ────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: build-and-deploy-backend   # Only deploy frontend after backend image is pushed

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Deploy to Vercel
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
