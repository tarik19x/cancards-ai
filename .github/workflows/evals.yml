name: RAG Quality Evals

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of questions (leave blank for all 30)"
        required: false
        default: ""
      save_baseline:
        description: "Save scores as new baseline? (yes/no)"
        required: false
        default: "no"

jobs:
  ragas-eval:
    name: RAGAS Evaluation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: backend
        run: uv sync --dev

      - name: Check ragas version and imports
        working-directory: backend
        run: |
          uv run python -c "
          import ragas
          print('ragas version:', ragas.__version__)
          try:
              from ragas import EvaluationDataset, SingleTurnSample
              print('EvaluationDataset: OK')
          except ImportError as e:
              print('EvaluationDataset: MISSING -', e)
          try:
              from ragas.metrics.collections import Faithfulness, ContextPrecision
              print('Faithfulness class: OK')
          except ImportError as e:
              print('Faithfulness class: MISSING -', e)
          try:
              from ragas.llms import llm_factory
              print('llm_factory: OK')
          except ImportError as e:
              print('llm_factory: MISSING -', e)
          "

      - name: Run RAGAS evaluations
        working-directory: backend
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          SAVE="${{ github.event.inputs.save_baseline }}"
          CMD="uv run python ../tests/evals/run_evals.py"
          if [ -n "$LIMIT" ]; then CMD="$CMD --limit $LIMIT"; fi
          if [ "$SAVE" = "yes" ]; then CMD="$CMD --save-baseline"; fi
          $CMD
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: cancards-index
          PINECONE_CLOUD: aws
          PINECONE_REGION: us-east-1
          EMBEDDING_MODEL: text-embedding-3-small
          LLM_MODEL: claude-sonnet-4-6
          LLM_PROVIDER: anthropic
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_TRACING: "false"